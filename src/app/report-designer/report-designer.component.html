<main class="designer-shell min-h-screen" [class.theme-dark]="state.theme() === 'dark'">
  <header class="topbar">
    <section class="brand-block min-w-0">
      <div class="brand-mark">R</div>
      <div>
        <p class="eyebrow">Report designer</p>
        <h1>{{ state.report().title }}</h1>
      </div>
    </section>

    <section class="report-meta" aria-label="Report overview">
      <label class="meta-field">
        <span>Title</span>
        <input
          type="text"
          [ngModel]="state.report().title"
          (ngModelChange)="state.updateMeta({ title: $event })"
        />
      </label>
      <label class="meta-field">
        <span>Subtitle</span>
        <input
          type="text"
          [ngModel]="state.report().subtitle"
          (ngModelChange)="state.updateMeta({ subtitle: $event })"
        />
      </label>

      <div class="status-chip" [class.saving]="state.syncStatus() === 'saving'">
        <span class="dot"></span>
        <div>
          <strong>{{ state.syncStatus() === 'saving' ? 'Saving...' : 'Saved' }}</strong>
          <small>{{ state.lastSyncedAt() }}</small>
        </div>
      </div>
      <div class="page-chip">
        <span>Page</span>
        <strong>{{ state.report().page.preset }}</strong>
        <small>{{ state.report().page.width }} × {{ state.report().page.height }}</small>
      </div>
    </section>

    <section class="toolbar" aria-label="Designer actions">
      <button class="icon-button" type="button" (click)="state.undo()" [disabled]="!state.canUndo()" title="Undo (Ctrl+Z)">
        ↺
      </button>
      <button class="icon-button" type="button" (click)="state.redo()" [disabled]="!state.canRedo()" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">
        ↻
      </button>
      <button class="icon-button" type="button" (click)="state.copySelected()" title="Copy selected (Ctrl+C)">
        ⎘
      </button>
      <button class="icon-button" type="button" (click)="state.cutSelected()" title="Cut selected (Ctrl+X)">
        ✂
      </button>
      <button class="icon-button" type="button" (click)="state.pasteClipboard()" title="Paste clipboard (Ctrl+V)">
        ⎄
      </button>
      <button class="icon-button" type="button" (click)="state.setShowGrid(!state.showGrid())" title="Toggle grid">
        ⊞
      </button>
      <button class="icon-button" type="button" (click)="state.toggleTheme()" title="Toggle theme">
        {{ state.theme() === 'dark' ? '☼' : '◐' }}
      </button>
      <button class="text-button danger" type="button" (click)="state.deleteSelected()" title="Delete selected block">Delete</button>
      <button class="primary-button" type="button" (click)="exportPdf()" title="Export PDF">Export</button>
    </section>
  </header>

  <section class="workspace gap-4">
    <app-report-palette />
    <app-report-canvas />
    <app-report-inspector />
  </section>
</main>
